# riscv-formal check suite, built and run by run.sh
# No CSR or bus checks, the core has neither yet

[options]
isa rv32i
solver yices

[depth]
insn      10
reg     5 10
pc_fwd  5 10
pc_bwd  5 10
unique  1 5 10
causal  5 10
liveness 1 5 10
cover   1 10

[defines]
`define RISCV_FORMAL
`define RISCV_FORMAL_ALIGNED_MEM

[verilog-files]
@basedir@/cores/@core@/wrapper.sv
@basedir@/cores/@core@/rv32i_single.v

[cover]
always @* if (!reset) cover (channel[0].cnt_insns >= 2);
