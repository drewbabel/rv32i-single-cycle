name: CI

on: [push, pull_request]

jobs:
  testbenches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Run every module testbench
        run: |
          shopt -s nullglob
          for tb in tb/*_tb.sv; do
            mod=$(basename "$tb" _tb.sv)
            if [ "$mod" = freertos_boot ]; then echo "== skip $mod (needs FreeRTOS image) =="; continue; fi
            echo "== $mod =="
            make MOD="$mod"
          done

  formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install sv2v
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/zachjs/sv2v/releases/download/v0.0.13/sv2v-Linux.zip -o sv2v.zip
          unzip -j sv2v.zip -d "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: alu formal
        run: make formal MOD=alu

  core-formal-list:
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.list.outputs.groups }}
    steps:
      - uses: actions/checkout@v4
      - name: Install sv2v
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/zachjs/sv2v/releases/download/v0.0.13/sv2v-Linux.zip -o sv2v.zip
          unzip -j sv2v.zip -d "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Split checks into groups
        id: list
        env:
          RISCV_FORMAL_DIR: ${{ github.workspace }}/riscv-formal
        run: |
          groups=$(bash formal/rvfi/run.sh --list | python3 -c "import sys, json; n=[l.strip() for l in sys.stdin if l.strip()]; g=[[] for _ in range(8)]; [g[i % 8].append(x) for i, x in enumerate(n)]; print(json.dumps([' '.join(x) for x in g if x]))")
          echo "groups=$groups" >> "$GITHUB_OUTPUT"

  core-formal:
    needs: core-formal-list
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJSON(needs.core-formal-list.outputs.groups) }}
    steps:
      - uses: actions/checkout@v4
      - uses: YosysHQ/setup-oss-cad-suite@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install sv2v
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sL https://github.com/zachjs/sv2v/releases/download/v0.0.13/sv2v-Linux.zip -o sv2v.zip
          unzip -j sv2v.zip -d "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Prove the group
        env:
          RISCV_FORMAL_DIR: ${{ github.workspace }}/riscv-formal
        run: bash formal/rvfi/run.sh ${{ matrix.group }}

  cosim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog and RISC-V toolchain
        run: |
          sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f
          sudo apt-get update
          sudo apt-get install -y iverilog gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf device-tree-compiler libfdt-dev
      - name: Alias toolchain to riscv64-elf-*
        run: |
          for t in gcc objcopy; do
            sudo ln -sf "$(command -v riscv64-unknown-elf-$t)" /usr/local/bin/riscv64-elf-$t
          done
      - name: Cache Spike
        id: spike-cache
        uses: actions/cache@v4
        with:
          path: /opt/spike
          key: spike-riscv-isa-sim-v1
      - name: Build Spike
        if: steps.spike-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/riscv-software-src/riscv-isa-sim.git
          cd riscv-isa-sim && mkdir build && cd build
          ../configure --prefix=/opt/spike
          make -j"$(nproc)"
          make install
      - name: Add Spike to environment
        run: |
          echo "/opt/spike/bin" >> "$GITHUB_PATH"
          echo "LD_LIBRARY_PATH=/opt/spike/lib" >> "$GITHUB_ENV"
      - name: Compiled-C co-sim
        run: python3 tests/cosim.py cprog
      - name: Randomized co-sim regression (500 programs)
        run: python3 tests/cosim.py --rand 500

  ci-gate:
    if: always()
    needs: [testbenches, formal, core-formal-list, core-formal, cosim]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all CI jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required CI jobs did not succeed."
          exit 1
